name: ci-windows-msvc

on:
  push:
    paths:
      - '**'
      - '!*.bat'
      - '!*.cmd'
      - '!*.sh'
      - '!doc_COM/*'
      - '!doc_DE/*'
      - '!doc_EN/*'
      - '!include/**'
      - '!man/*'
      - '!COPYING'
      - '!INSTALL'
      - '!README*'
      - '!.clang*'
      - '!.gitignore'
      - '!.gitattributes'
      - '!.github/workflows/*'
      - '.github/workflows/ci-windows-msvc.yml'
  pull_request:
    paths:
      - '**'
      - '!*.bat'
      - '!*.cmd'
      - '!*.sh'
      - '!doc_COM/*'
      - '!doc_DE/*'
      - '!doc_EN/*'
      - '!include/**'
      - '!man/*'
      - '!COPYING'
      - '!INSTALL'
      - '!README*'
      - '!.clang*'
      - '!.gitignore'
      - '!.gitattributes'
      - '!.github/workflows/*'
      - '.github/workflows/ci-windows-msvc.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  ci-windows-msvc:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: vs2022
            runs_on: windows-2022
            cmake_generator: Visual Studio 17 2022
          - name: latest
            runs_on: windows-latest
            cmake_generator: ''
    name: ci-windows-msvc (${{ matrix.name }})
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: '3.1.11'
      - name: Checkout code
        uses: actions/checkout@master
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v1.0.2
      - name: Select Visual Studio generator
        shell: pwsh
        run: |
          $generator = '${{ matrix.cmake_generator }}'

          if (-not $generator) {
            $capabilities = cmake -E capabilities | ConvertFrom-Json
            $generator = $capabilities.generators |
              Where-Object { $_.name -match '^Visual Studio \d+ \d{4}$' } |
              Sort-Object { [int]([regex]::Match($_.name, '^Visual Studio (\d+)').Groups[1].Value) } -Descending |
              Select-Object -ExpandProperty name -First 1
          }

          if (-not $generator) {
            throw 'No Visual Studio generator found in CMake capabilities.'
          }

          "CMAKE_GENERATOR=$generator" >> $env:GITHUB_ENV
          Write-Host "Selected CMake generator: $generator"
      - name: Configure
        run: |
          cmake -S . -B build -A x64 -G "$env:CMAKE_GENERATOR"
      - name: Build
        run: |
          cmake --build build --config Debug --parallel
      - name: Test
        env:
          VERBOSE: 1
        run: |
          ctest --build-run-dir build --test-dir build -j --rerun-failed --output-on-failure -C Debug
